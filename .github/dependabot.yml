version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      storybook:
        patterns:
          - '@storybook/*'
          - 'storybook'
      vite:
        patterns:
          - 'vite'
          - '@vitejs/*'
          - 'vitest'
